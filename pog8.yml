--- 
- name: Deploy Maven Artifact 
  hosts: local 
  become: yes 
   tasks: 
    - name: Copy the artifact to the deployment directory 
      copy: 
           src: "/var/lib/jenkins/workspace/maven-example/target/HelloMaven-1.0-SNAPSHOT.jar" 
           dest: "/opt/deployment/HelloMaven.jar"
    - name: Run Application
      shell: nohup java -jar/opt/maven-example-1.0-SNAPSHOT.jar &
