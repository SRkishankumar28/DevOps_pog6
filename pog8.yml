---
- name: Deploy Maven Artifact
  hosts: localhost
  become: no

  tasks:
    - name: Copy the artifact to the deployment directory
      copy:
        src: "/var/lib/jenkins/workspace/pog8/target/maven-example-1.0-SNAPSHOT.jar"
        dest: "/opt/deployment/maven-example.jar"

    - name: Run Application
      shell: nohup java -jar /opt/deployment/maven-example.jar &
